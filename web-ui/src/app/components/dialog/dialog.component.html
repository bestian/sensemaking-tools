<div class="root">
  <h2 mat-dialog-title>{{ data.title }}</h2>
  <mat-dialog-content>
    <div>{{ data.text }}</div>
    <div class="copy-container">
      <div class="copy-text">{{ data.link }}</div>
      <button mat-icon-button (click)="copyLink()" [attr.aria-label]="t('dialogCopyLink')">
        <mat-icon>content_copy</mat-icon>
      </button>
    </div>
  </mat-dialog-content>
  <mat-dialog-actions>
    <button mat-button (click)="close()">{{ t("dialogClose") }}</button>
  </mat-dialog-actions>
</div>
